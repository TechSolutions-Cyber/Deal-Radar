<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mystery Card – Deal Radar</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --mc-bg:      #0f172a;
    --mc-surf:    #1e293b;
    --mc-surf2:   #334155;
    --mc-border:  rgba(255,255,255,0.08);
    --mc-text:    #f1f5f9;
    --mc-muted:   #94a3b8;
    --mc-purple:  #8B5CF6;
    --mc-cyan:    #22D3EE;
    --mc-grad:    linear-gradient(135deg, #8B5CF6, #22D3EE);
  }

  html, body {
    min-height: 100%;
    background: var(--mc-bg);
    color: var(--mc-text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* ── glow ── */
  .mc-glow {
    position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
  }
  .mc-glow::before {
    content: "";
    position: absolute;
    top: -200px; left: 50%; transform: translateX(-50%);
    width: 800px; height: 800px;
    background: radial-gradient(circle, rgba(139,92,246,.22) 0%, rgba(34,211,238,.08) 40%, transparent 70%);
    filter: blur(40px);
  }

  /* ── header ── */
  .mc-header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(15,23,42,.8);
    border-bottom: 1px solid var(--mc-border);
    backdrop-filter: blur(12px);
  }
  .mc-header-inner {
    max-width: 720px; margin: 0 auto;
    padding: 14px 20px;
    display: flex; align-items: center; gap: 14px;
  }
  .mc-back {
    color: var(--mc-muted); font-size: .9rem; text-decoration: none;
    display: inline-flex; align-items: center; gap: 5px;
    transition: color .2s;
  }
  .mc-back:hover { color: var(--mc-text); }
  .mc-header-title {
    font-size: 1rem; font-weight: 700;
    background: var(--mc-grad); -webkit-background-clip: text;
    background-clip: text; -webkit-text-fill-color: transparent;
  }

  /* ── layout ── */
  .mc-page {
    position: relative; z-index: 1;
    max-width: 860px; margin: 0 auto;
    padding: 52px 20px 80px;
    display: flex; flex-direction: column; align-items: center; gap: 36px;
    text-align: center;
  }

  /* ── two-card row ── */
  .mc-cards-row {
    display: flex; gap: 28px; justify-content: center; align-items: flex-start;
    width: 100%; flex-wrap: wrap;
  }
  .mc-card-col {
    display: flex; flex-direction: column; align-items: center; gap: 18px;
    flex: 1; min-width: 220px; max-width: 340px;
  }
  .mc-marketplace-badge {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 6px 16px; border-radius: 100px;
    font-size: .78rem; font-weight: 800; letter-spacing: .06em; text-transform: uppercase;
  }
  .mc-marketplace-badge.opensea {
    background: rgba(139,92,246,.15); border: 1px solid rgba(139,92,246,.45);
    color: #c4b5fd;
  }
  .mc-marketplace-badge.magiceden {
    background: rgba(228,37,117,.15); border: 1px solid rgba(228,37,117,.45);
    color: #fca5b8;
  }

  /* ── intro ── */
  .mc-intro h1 {
    font-size: clamp(1.7rem, 5vw, 2.5rem);
    font-weight: 800; letter-spacing: -.03em; margin-bottom: 10px;
    background: var(--mc-grad); -webkit-background-clip: text;
    background-clip: text; -webkit-text-fill-color: transparent;
  }
  .mc-intro p { color: var(--mc-muted); font-size: .95rem; line-height: 1.6; max-width: 380px; margin: 0 auto; }

  /* ── 3-D card ── */
  .mc-stage {
    perspective: 900px;
    width: 200px; height: 290px;
  }
  @media (max-width: 400px) { .mc-stage { width: 168px; height: 244px; } }

  .mc-inner {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform .65s cubic-bezier(.4,0,.2,1);
  }
  .mc-inner.mc-flipped { transform: rotateY(180deg); }

  .mc-face {
    position: absolute; inset: 0;
    border-radius: 16px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border: 1.5px solid rgba(139,92,246,.45);
    box-shadow: 0 8px 36px rgba(139,92,246,.22);
    overflow: hidden;
  }

  /* front */
  .mc-front {
    background: linear-gradient(145deg, #1e1b4b 0%, #0f172a 55%, #170d2f 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 10px;
  }
  .mc-front::before {
    content: "";
    position: absolute; inset: 0;
    background:
      repeating-linear-gradient(45deg,  rgba(139,92,246,.04) 0, rgba(139,92,246,.04) 1px, transparent 1px, transparent 18px),
      repeating-linear-gradient(-45deg, rgba(34,211,238,.03)  0, rgba(34,211,238,.03)  1px, transparent 1px, transparent 18px);
  }
  .mc-qmark {
    position: relative;
    font-size: 5.5rem; line-height: 1;
    animation: mc-pulse 2.6s ease-in-out infinite;
    filter: drop-shadow(0 0 18px rgba(139,92,246,.7));
  }
  .mc-front-label {
    position: relative;
    font-size: .68rem; font-weight: 700;
    letter-spacing: .18em; text-transform: uppercase;
    color: rgba(196,181,253,.65);
  }
  @keyframes mc-pulse {
    0%,100% { transform: scale(1);    filter: drop-shadow(0 0 16px rgba(139,92,246,.6)); }
    50%      { transform: scale(1.08); filter: drop-shadow(0 0 28px rgba(139,92,246,.95)); }
  }

  /* back */
  .mc-back-face {
    transform: rotateY(180deg);
    background: var(--mc-surf);
    display: flex; flex-direction: column;
  }
  .mc-art {
    flex: 1; display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden; font-size: 4.5rem;
  }
  .mc-art-bg { position: absolute; inset: 0; }
  .mc-art-emoji { position: relative; z-index: 1; filter: drop-shadow(0 4px 10px rgba(0,0,0,.55)); }
  .mc-art-info {
    padding: 9px 13px;
    background: rgba(0,0,0,.4); backdrop-filter: blur(4px);
  }
  .mc-art-name { font-size: .82rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .mc-art-val  { font-size: .75rem; font-weight: 600; color: var(--mc-cyan); margin-top: 2px; }

  /* ── reveal buttons ── */
  .mc-btn-buy {
    display: inline-flex; align-items: center; gap: 9px;
    padding: 12px 28px;
    border-radius: 12px;
    font-weight: 800; font-size: .95rem; font-family: inherit;
    border: none; cursor: pointer;
    transition: transform .15s, box-shadow .2s;
    letter-spacing: -.01em; width: 100%;
    justify-content: center;
  }
  .mc-btn-buy.opensea {
    background: var(--mc-grad); color: #0f172a;
    box-shadow: 0 4px 22px rgba(139,92,246,.4);
  }
  .mc-btn-buy.opensea:hover:not(:disabled) {
    transform: translateY(-2px); box-shadow: 0 8px 30px rgba(139,92,246,.6);
  }
  .mc-btn-buy.magiceden {
    background: linear-gradient(135deg,#e42575,#ff6b35); color: #fff;
    box-shadow: 0 4px 22px rgba(228,37,117,.4);
  }
  .mc-btn-buy.magiceden:hover:not(:disabled) {
    transform: translateY(-2px); box-shadow: 0 8px 30px rgba(228,37,117,.6);
  }
  .mc-btn-buy:disabled { opacity: .45; cursor: not-allowed; }

  /* ── result panel ── */
  .mc-result {
    display: none; width: 100%;
    background: var(--mc-surf);
    border-radius: 14px; padding: 20px 18px;
    animation: mc-fadein .45s ease;
  }
  .mc-result.opensea  { border: 1px solid rgba(139,92,246,.35); }
  .mc-result.magiceden { border: 1px solid rgba(228,37,117,.35); }
  .mc-result.mc-show { display: block; }
  @keyframes mc-fadein {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .mc-result-name {
    font-size: 1.05rem; font-weight: 800; letter-spacing: -.02em; margin-bottom: 4px;
  }
  .mc-result-val {
    font-size: .95rem; font-weight: 700; color: var(--mc-cyan); margin-bottom: 14px;
  }
  .mc-market-link {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 20px; border-radius: 10px;
    font-weight: 700; font-size: .88rem;
    text-decoration: none; width: 100%; justify-content: center;
    transition: transform .15s, box-shadow .2s;
  }
  .mc-market-link.opensea {
    background: var(--mc-grad); color: #0f172a;
    box-shadow: 0 4px 18px rgba(139,92,246,.35);
  }
  .mc-market-link.opensea:hover { transform: translateY(-2px); box-shadow: 0 7px 26px rgba(139,92,246,.55); }
  .mc-market-link.magiceden {
    background: linear-gradient(135deg,#e42575,#ff6b35); color: #fff;
    box-shadow: 0 4px 18px rgba(228,37,117,.35);
  }
  .mc-market-link.magiceden:hover { transform: translateY(-2px); box-shadow: 0 7px 26px rgba(228,37,117,.55); }

  .mc-reset-btn {
    display: block; margin: 10px auto 0;
    background: none; border: 1px solid var(--mc-surf2);
    color: var(--mc-muted); padding: 8px 18px;
    border-radius: 9px; font-size: .82rem; font-family: inherit;
    cursor: pointer; transition: border-color .2s, color .2s; width: 100%;
  }
  .mc-reset-btn:hover { border-color: var(--mc-purple); color: var(--mc-text); }

  .mc-disclaimer {
    font-size: .75rem; color: var(--mc-muted); max-width: 500px; line-height: 1.55;
  }

  /* ── AdSense Slots ── */
  .mc-ad-slot {
    width: 100%; max-width: 728px;
    min-height: 90px;
    background: rgba(255,255,255,0.03);
    border: 1px dashed rgba(255,255,255,0.1);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }

  @media (max-width: 500px) {
    .mc-cards-row { gap: 18px; }
    .mc-card-col { min-width: 150px; }
  }
</style>

let revealedOS = false;
let revealedME = false;

function mcRevealOS() {
  if (revealedOS) return;
  revealedOS = true;
  document.getElementById('mcBuyBtnOS').disabled = true;
  const card = MC_CARDS_OS[Math.floor(Math.random() * MC_CARDS_OS.length)];
  document.getElementById('mcArtBgOS').style.background  = card.gradient;
  document.getElementById('mcArtEmojiOS').textContent    = card.emoji;
  document.getElementById('mcArtNameOS').textContent     = card.name;
  document.getElementById('mcArtValOS').textContent      = card.value;
  document.getElementById('mcInnerOS').classList.add('mc-flipped');
  setTimeout(function() {
    document.getElementById('mcResultNameOS').textContent = card.name;
    document.getElementById('mcResultValOS').textContent  = card.value;
    document.getElementById('mcOpenseaLink').href         = card.url;
    document.getElementById('mcResultOS').classList.add('mc-show');
  }, 750);
}

function mcResetOS() {
  revealedOS = false;
  document.getElementById('mcInnerOS').classList.remove('mc-flipped');
  document.getElementById('mcResultOS').classList.remove('mc-show');
  document.getElementById('mcBuyBtnOS').disabled = false;
}
