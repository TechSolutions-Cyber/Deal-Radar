<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mystery Card – Deal Radar</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --mc-bg:      #0f172a;
    --mc-surf:    #1e293b;
    --mc-surf2:   #334155;
    --mc-border:  rgba(255,255,255,0.08);
    --mc-text:    #f1f5f9;
    --mc-muted:   #94a3b8;
    --mc-purple:  #8B5CF6;
    --mc-cyan:    #22D3EE;
    --mc-grad:    linear-gradient(135deg, #8B5CF6, #22D3EE);
  }

  html, body {
    min-height: 100%;
    background: var(--mc-bg);
    color: var(--mc-text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* ── glow ── */
  .mc-glow {
    position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
  }
  .mc-glow::before {
    content: "";
    position: absolute;
    top: -200px; left: 50%; transform: translateX(-50%);
    width: 800px; height: 800px;
    background: radial-gradient(circle, rgba(139,92,246,.22) 0%, rgba(34,211,238,.08) 40%, transparent 70%);
    filter: blur(40px);
  }

  /* ── header ── */
  .mc-header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(15,23,42,.8);
    border-bottom: 1px solid var(--mc-border);
    backdrop-filter: blur(12px);
  }
  .mc-header-inner {
    max-width: 720px; margin: 0 auto;
    padding: 14px 20px;
    display: flex; align-items: center; gap: 14px;
  }
  .mc-back {
    color: var(--mc-muted); font-size: .9rem; text-decoration: none;
    display: inline-flex; align-items: center; gap: 5px;
    transition: color .2s;
  }
  .mc-back:hover { color: var(--mc-text); }
  .mc-header-title {
    font-size: 1rem; font-weight: 700;
    background: var(--mc-grad); -webkit-background-clip: text;
    background-clip: text; -webkit-text-fill-color: transparent;
  }

  /* ── layout ── */
  .mc-page {
    position: relative; z-index: 1;
    max-width: 520px; margin: 0 auto;
    padding: 52px 20px 80px;
    display: flex; flex-direction: column; align-items: center; gap: 36px;
    text-align: center;
  }

  /* ── intro ── */
  .mc-intro h1 {
    font-size: clamp(1.7rem, 5vw, 2.5rem);
    font-weight: 800; letter-spacing: -.03em; margin-bottom: 10px;
    background: var(--mc-grad); -webkit-background-clip: text;
    background-clip: text; -webkit-text-fill-color: transparent;
  }
  .mc-intro p { color: var(--mc-muted); font-size: .95rem; line-height: 1.6; max-width: 380px; margin: 0 auto; }

  /* ── 3-D card ── */
  .mc-stage {
    perspective: 900px;
    width: 200px; height: 290px;
  }
  @media (max-width: 400px) { .mc-stage { width: 168px; height: 244px; } }

  .mc-inner {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform .65s cubic-bezier(.4,0,.2,1);
  }
  .mc-inner.mc-flipped { transform: rotateY(180deg); }

  .mc-face {
    position: absolute; inset: 0;
    border-radius: 16px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border: 1.5px solid rgba(139,92,246,.45);
    box-shadow: 0 8px 36px rgba(139,92,246,.22);
    overflow: hidden;
  }

  /* front */
  .mc-front {
    background: linear-gradient(145deg, #1e1b4b 0%, #0f172a 55%, #170d2f 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 10px;
  }
  .mc-front::before {
    content: "";
    position: absolute; inset: 0;
    background:
      repeating-linear-gradient(45deg,  rgba(139,92,246,.04) 0, rgba(139,92,246,.04) 1px, transparent 1px, transparent 18px),
      repeating-linear-gradient(-45deg, rgba(34,211,238,.03)  0, rgba(34,211,238,.03)  1px, transparent 1px, transparent 18px);
  }
  .mc-qmark {
    position: relative;
    font-size: 5.5rem; line-height: 1;
    animation: mc-pulse 2.6s ease-in-out infinite;
    filter: drop-shadow(0 0 18px rgba(139,92,246,.7));
  }
  .mc-front-label {
    position: relative;
    font-size: .68rem; font-weight: 700;
    letter-spacing: .18em; text-transform: uppercase;
    color: rgba(196,181,253,.65);
  }
  @keyframes mc-pulse {
    0%,100% { transform: scale(1);    filter: drop-shadow(0 0 16px rgba(139,92,246,.6)); }
    50%      { transform: scale(1.08); filter: drop-shadow(0 0 28px rgba(139,92,246,.95)); }
  }

  /* back */
  .mc-back-face {
    transform: rotateY(180deg);
    background: var(--mc-surf);
    display: flex; flex-direction: column;
  }
  .mc-art {
    flex: 1; display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden; font-size: 4.5rem;
  }
  .mc-art-bg { position: absolute; inset: 0; }
  .mc-art-emoji { position: relative; z-index: 1; filter: drop-shadow(0 4px 10px rgba(0,0,0,.55)); }
  .mc-art-info {
    padding: 9px 13px;
    background: rgba(0,0,0,.4); backdrop-filter: blur(4px);
  }
  .mc-art-name { font-size: .82rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .mc-art-val  { font-size: .75rem; font-weight: 600; color: var(--mc-cyan); margin-top: 2px; }

  /* ── buy button ── */
  .mc-btn-buy {
    display: inline-flex; align-items: center; gap: 9px;
    padding: 14px 34px;
    border-radius: 12px;
    background: var(--mc-grad);
    color: #0f172a;
    font-weight: 800; font-size: 1rem; font-family: inherit;
    border: none; cursor: pointer;
    box-shadow: 0 4px 22px rgba(139,92,246,.4);
    transition: transform .15s, box-shadow .2s;
    letter-spacing: -.01em;
  }
  .mc-btn-buy:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(139,92,246,.6);
  }
  .mc-btn-buy:disabled { opacity: .45; cursor: not-allowed; }

  /* ── result panel ── */
  .mc-result {
    display: none;
    width: 100%;
    background: var(--mc-surf);
    border: 1px solid rgba(139,92,246,.3);
    border-radius: 16px; padding: 26px 24px;
    animation: mc-fadein .45s ease;
  }
  .mc-result.mc-show { display: block; }
  @keyframes mc-fadein {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .mc-tag {
    display: inline-block;
    padding: 4px 13px; margin-bottom: 12px;
    border-radius: 100px;
    background: rgba(139,92,246,.12);
    border: 1px solid rgba(139,92,246,.35);
    color: #c4b5fd; font-size: .75rem; font-weight: 600;
    letter-spacing: .08em; text-transform: uppercase;
  }
  .mc-result-name {
    font-size: 1.25rem; font-weight: 800; letter-spacing: -.02em; margin-bottom: 5px;
  }
  .mc-result-val {
    font-size: 1rem; font-weight: 700; color: var(--mc-cyan); margin-bottom: 20px;
  }
  .mc-market-btns {
    display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
  }
  .mc-opensea, .mc-magiceden {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 11px 18px; border-radius: 10px;
    font-weight: 700; font-size: .85rem;
    text-decoration: none; flex: 1; min-width: 130px;
    justify-content: center;
    transition: transform .15s, box-shadow .2s;
  }
  .mc-opensea {
    background: var(--mc-grad);
    color: #0f172a;
    box-shadow: 0 4px 18px rgba(139,92,246,.35);
  }
  .mc-opensea:hover { transform: translateY(-2px); box-shadow: 0 7px 26px rgba(139,92,246,.55); }
  .mc-magiceden {
    background: linear-gradient(135deg, #e42575, #ff6b35);
    color: #fff;
    box-shadow: 0 4px 18px rgba(228,37,117,.35);
  }
  .mc-magiceden:hover { transform: translateY(-2px); box-shadow: 0 7px 26px rgba(228,37,117,.55); }

  .mc-reset-btn {
    display: block; margin: 12px auto 0;
    background: none; border: 1px solid var(--mc-surf2);
    color: var(--mc-muted); padding: 9px 22px;
    border-radius: 9px; font-size: .88rem; font-family: inherit;
    cursor: pointer; transition: border-color .2s, color .2s;
  }
  .mc-reset-btn:hover { border-color: var(--mc-purple); color: var(--mc-text); }

  .mc-disclaimer {
    font-size: .75rem; color: var(--mc-muted); max-width: 360px; line-height: 1.55;
  }
</style>
</head>
<body>

<div class="mc-glow"></div>

<header class="mc-header">
  <div class="mc-header-inner">
    <a href="/" class="mc-back">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Zurück
    </a>
    <span class="mc-header-title">🎴 Mystery Card</span>
  </div>
</header>

<div class="mc-page">

  <div class="mc-intro">
    <h1>Mystery Card</h1>
    <p>Klicke auf „Buy &amp; Reveal" und enthülle eine zufällige NFT-Karte aus unserem Sortiment.</p>
  </div>

  <!-- 3-D flip card -->
  <div class="mc-stage">
    <div class="mc-inner" id="mcInner">

      <div class="mc-face mc-front">
        <div class="mc-qmark">?</div>
        <div class="mc-front-label">Mystery</div>
      </div>

      <div class="mc-face mc-back-face">
        <div class="mc-art">
          <div class="mc-art-bg"  id="mcArtBg"></div>
          <div class="mc-art-emoji" id="mcArtEmoji"></div>
        </div>
        <div class="mc-art-info">
          <div class="mc-art-name" id="mcArtName"></div>
          <div class="mc-art-val"  id="mcArtVal"></div>
        </div>
      </div>

    </div>
  </div>

  <button class="mc-btn-buy" id="mcBuyBtn" onclick="mcReveal()">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    Buy &amp; Reveal
  </button>

  <div class="mc-result" id="mcResult">
    <div class="mc-tag">✨ Enthüllt</div>
    <div class="mc-result-name" id="mcResultName"></div>
    <div class="mc-result-val"  id="mcResultVal"></div>
    <div class="mc-market-btns">
      <a href="#" class="mc-opensea" id="mcOpenseaLink" target="_blank" rel="noopener noreferrer">
        <svg width="16" height="16" viewBox="0 0 90 90" fill="currentColor"><path d="M45 0C20.1 0 0 20.1 0 45s20.1 45 45 45 45-20.1 45-45S69.9 0 45 0zM22.1 46.3l.2-.3 12.9-20.2c.2-.3.6-.2.7.1 2.1 4.8 4 10.8 3.1 14.5-.4 1.5-1.4 3.6-2.5 5.5-.2.3-.3.6-.5.9-.1.2-.3.2-.5.2H22.5c-.3 0-.5-.3-.4-.7zm56.5 7.3c0 .2-.1.3-.3.4-1.7.7-7.5 3.2-9.9 6.4-6.1 8.5-10.8 20.7-21.3 20.7H34.8c-15.6 0-28.3-12.7-28.3-28.3v-.5c0-.2.2-.4.4-.4h18.5c.3 0 .5.3.5.6-.1 1-.1 2 .1 2.9.8 3.8 4 6.5 7.9 6.7.4 0 .8 0 1.2-.1 6.5-1 9.7-7.4 11.2-13.3l.1-.3c.2-.9.4-1.7.5-2.5.3-3-.1-6.5-1.1-10.1-.1-.3.1-.7.4-.8l.2-.1c1.2-.6 2.4-1.1 3.7-1.6.4-.2.8.1.8.5v.3c0 3.1.2 6.2.8 9.2l.1.5c.6 2.5 1.7 5 3.3 7.2.3.4.5.7.8 1.1.2.3.2.7-.1.9-1.3 1.1-2.7 2-4.2 2.8-.2.1-.3.4-.1.6l.1.1c3.4 2.3 7.4 3.4 11.5 3.4H68c.6 0 1.2-.1 1.8-.2 3.5-.8 5.7-4.1 5.7-7.6v-.5c0-.3.2-.5.4-.5h2.4c.2 0 .4.2.4.4v1.3h-.1z"/></svg>
        OpenSea
      </a>
      <a href="#" class="mc-magiceden" id="mcMagicedenLink" target="_blank" rel="noopener noreferrer">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
        Magic Eden
      </a>
    </div>
    <button class="mc-reset-btn" onclick="mcReset()">Neue Karte ziehen</button>
  </div>

  <p class="mc-disclaimer">UI-Mockup · Keine echte Zahlung · NFTs zu Demo-Zwecken</p>

</div>

<script>
const MC_CARDS = [
  { name: "Neon Tiger #001",       emoji: "🐯", gradient: "linear-gradient(135deg,#f97316,#ef4444)", opensea_url: "https://opensea.io/collection/solana-neon-tiger",       magiceden_url: "https://magiceden.io/marketplace/neon_tiger",       value: "1.2 SOL"  },
  { name: "Cosmic Dragon #042",    emoji: "🐉", gradient: "linear-gradient(135deg,#8B5CF6,#1d4ed8)", opensea_url: "https://opensea.io/collection/solana-cosmic-dragon",    magiceden_url: "https://magiceden.io/marketplace/cosmic_dragon",    value: "2.5 SOL"  },
  { name: "Pixel Fox #007",        emoji: "🦊", gradient: "linear-gradient(135deg,#f59e0b,#b45309)", opensea_url: "https://opensea.io/collection/solana-pixel-fox",        magiceden_url: "https://magiceden.io/marketplace/pixel_fox",        value: "0.6 SOL"  },
  { name: "Glitch Owl #113",       emoji: "🦉", gradient: "linear-gradient(135deg,#22D3EE,#0284c7)", opensea_url: "https://opensea.io/collection/solana-glitch-owl",       magiceden_url: "https://magiceden.io/marketplace/glitch_owl",       value: "1.4 SOL"  },
  { name: "Shadow Wolf #088",      emoji: "🐺", gradient: "linear-gradient(135deg,#475569,#0f172a)", opensea_url: "https://opensea.io/collection/solana-shadow-wolf",      magiceden_url: "https://magiceden.io/marketplace/shadow_wolf",      value: "1.9 SOL"  },
  { name: "Crystal Unicorn #003",  emoji: "🦄", gradient: "linear-gradient(135deg,#ec4899,#8B5CF6)", opensea_url: "https://opensea.io/collection/solana-crystal-unicorn",  magiceden_url: "https://magiceden.io/marketplace/crystal_unicorn",  value: "3.8 SOL"  },
  { name: "Inferno Phoenix #019",  emoji: "🔥", gradient: "linear-gradient(135deg,#ef4444,#fbbf24)", opensea_url: "https://opensea.io/collection/solana-inferno-phoenix",  magiceden_url: "https://magiceden.io/marketplace/inferno_phoenix",  value: "2.9 SOL"  },
  { name: "Deep Sea Kraken #055",  emoji: "🐙", gradient: "linear-gradient(135deg,#0e7490,#064e3b)", opensea_url: "https://opensea.io/collection/solana-deep-sea-kraken",  magiceden_url: "https://magiceden.io/marketplace/deep_sea_kraken",  value: "1.1 SOL"  },
  { name: "Galactic Bear #031",    emoji: "🐻", gradient: "linear-gradient(135deg,#7c3aed,#1e1b4b)", opensea_url: "https://opensea.io/collection/solana-galactic-bear",    magiceden_url: "https://magiceden.io/marketplace/galactic_bear",    value: "0.9 SOL"  },
  { name: "Neon Shark #099",       emoji: "🦈", gradient: "linear-gradient(135deg,#22D3EE,#1d4ed8)", opensea_url: "https://opensea.io/collection/solana-neon-shark",       magiceden_url: "https://magiceden.io/marketplace/neon_shark",       value: "1.7 SOL"  }
];

let revealed = false;

function mcReveal() {
  if (revealed) return;
  revealed = true;
  document.getElementById('mcBuyBtn').disabled = true;

  const card = MC_CARDS[Math.floor(Math.random() * MC_CARDS.length)];

  document.getElementById('mcArtBg').style.background    = card.gradient;
  document.getElementById('mcArtEmoji').textContent      = card.emoji;
  document.getElementById('mcArtName').textContent       = card.name;
  document.getElementById('mcArtVal').textContent        = card.value;

  document.getElementById('mcInner').classList.add('mc-flipped');

  setTimeout(function() {
    var r = document.getElementById('mcResult');
    document.getElementById('mcResultName').textContent  = card.name;
    document.getElementById('mcResultVal').textContent   = card.value;
    document.getElementById('mcOpenseaLink').href        = card.opensea_url;
    document.getElementById('mcMagicedenLink').href      = card.magiceden_url;
    r.classList.add('mc-show');
  }, 750);
}

function mcReset() {
  revealed = false;
  document.getElementById('mcInner').classList.remove('mc-flipped');
  document.getElementById('mcResult').classList.remove('mc-show');
  document.getElementById('mcBuyBtn').disabled = false;
}
</script>

</body>
</html>
