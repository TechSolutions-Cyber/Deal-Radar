<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mystery Card – Deal Radar</title>
<meta name="description" content="Kaufe eine Mystery Card und enthülle eine zufällige NFT-Karte.">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --mc-bg: #0f172a;
    --mc-surface: #1e293b;
    --mc-surface2: #334155;
    --mc-border: #334155;
    --mc-text: #f1f5f9;
    --mc-muted: #94a3b8;
    --mc-purple: #8B5CF6;
    --mc-cyan: #22D3EE;
    --mc-gradient: linear-gradient(135deg, #8B5CF6 0%, #22D3EE 100%);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--mc-bg);
    color: var(--mc-text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* Background glow */
  .mc-bg-glow {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .mc-bg-glow::before {
    content: "";
    position: absolute;
    top: -150px;
    left: 50%;
    transform: translateX(-50%);
    width: 700px;
    height: 700px;
    background: radial-gradient(circle, rgba(139,92,246,0.2) 0%, rgba(34,211,238,0.08) 45%, transparent 70%);
    filter: blur(40px);
  }

  /* Header */
  .mc-header {
    width: 100%;
    background: rgba(30,41,59,0.85);
    border-bottom: 1px solid var(--mc-border);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .mc-header-inner {
    max-width: 700px;
    margin: 0 auto;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .mc-back-link {
    color: var(--mc-muted);
    text-decoration: none;
    font-size: 0.9rem;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: color 0.2s;
  }
  .mc-back-link:hover { color: var(--mc-text); }
  .mc-header-title {
    font-size: 1.1rem;
    font-weight: 700;
    background: var(--mc-gradient);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* Main content */
  .mc-main {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 700px;
    padding: 48px 20px 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
  }

  /* Intro text */
  .mc-intro {
    text-align: center;
  }
  .mc-intro h1 {
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    margin-bottom: 10px;
    background: var(--mc-gradient);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .mc-intro p {
    color: var(--mc-muted);
    font-size: 1rem;
    max-width: 480px;
    margin: 0 auto;
    line-height: 1.6;
  }

  /* Card stage */
  .mc-stage {
    perspective: 1000px;
    width: 220px;
    height: 320px;
  }
  @media (max-width: 400px) {
    .mc-stage { width: 180px; height: 260px; }
  }

  .mc-card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .mc-card-inner.mc-flipped {
    transform: rotateY(180deg);
  }

  .mc-card-face {
    position: absolute;
    inset: 0;
    border-radius: 18px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    overflow: hidden;
    border: 2px solid rgba(139,92,246,0.4);
    box-shadow: 0 8px 40px rgba(139,92,246,0.25);
  }

  /* Front face: mystery ? */
  .mc-card-front {
    background: linear-gradient(145deg, #1e1b4b 0%, #0f172a 50%, #1a1040 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }
  .mc-card-front::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(45deg, rgba(139,92,246,0.05) 0px, rgba(139,92,246,0.05) 2px, transparent 2px, transparent 20px),
      repeating-linear-gradient(-45deg, rgba(34,211,238,0.04) 0px, rgba(34,211,238,0.04) 2px, transparent 2px, transparent 20px);
  }
  .mc-question-mark {
    position: relative;
    font-size: 6rem;
    line-height: 1;
    filter: drop-shadow(0 0 20px rgba(139,92,246,0.6));
    animation: mc-pulse 2.5s ease-in-out infinite;
  }
  .mc-card-front-label {
    position: relative;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(196,181,253,0.7);
  }
  @keyframes mc-pulse {
    0%, 100% { transform: scale(1); filter: drop-shadow(0 0 18px rgba(139,92,246,0.5)); }
    50% { transform: scale(1.07); filter: drop-shadow(0 0 30px rgba(139,92,246,0.9)); }
  }

  /* Back face: revealed card */
  .mc-card-back {
    transform: rotateY(180deg);
    background: var(--mc-surface);
    display: flex;
    flex-direction: column;
  }
  .mc-card-art {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 5rem;
    position: relative;
    overflow: hidden;
  }
  .mc-card-art-bg {
    position: absolute;
    inset: 0;
    opacity: 0.9;
  }
  .mc-card-art-emoji {
    position: relative;
    z-index: 1;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.6));
  }
  .mc-card-info {
    padding: 10px 12px;
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(4px);
  }
  .mc-card-name {
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--mc-text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .mc-card-value {
    font-size: 0.78rem;
    color: var(--mc-cyan);
    font-weight: 600;
    margin-top: 2px;
  }

  /* Reveal result panel */
  .mc-result {
    display: none;
    width: 100%;
    background: var(--mc-surface);
    border: 1px solid rgba(139,92,246,0.35);
    border-radius: 16px;
    padding: 24px;
    text-align: center;
    animation: mc-fade-in 0.5s ease;
  }
  .mc-result.mc-visible { display: block; }
  @keyframes mc-fade-in {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .mc-result-tag {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 100px;
    background: rgba(139,92,246,0.15);
    border: 1px solid rgba(139,92,246,0.4);
    color: #C4B5FD;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .mc-result-name {
    font-size: 1.3rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    margin-bottom: 6px;
  }
  .mc-result-value {
    font-size: 1.05rem;
    color: var(--mc-cyan);
    font-weight: 700;
    margin-bottom: 20px;
  }
  .mc-opensea-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 24px;
    border-radius: 10px;
    background: var(--mc-gradient);
    color: #0f172a;
    font-weight: 700;
    font-size: 0.95rem;
    text-decoration: none;
    transition: transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(139,92,246,0.35);
  }
  .mc-opensea-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(139,92,246,0.55);
  }

  /* Buy button */
  .mc-btn-buy {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 15px 36px;
    border-radius: 12px;
    background: var(--mc-gradient);
    color: #0f172a;
    font-weight: 800;
    font-size: 1.05rem;
    border: none;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 4px 24px rgba(139,92,246,0.4);
    font-family: inherit;
    letter-spacing: -0.01em;
  }
  .mc-btn-buy:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(139,92,246,0.6);
  }
  .mc-btn-buy:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .mc-try-again-btn {
    background: none;
    border: 1px solid var(--mc-border);
    color: var(--mc-muted);
    padding: 10px 24px;
    border-radius: 10px;
    font-size: 0.9rem;
    cursor: pointer;
    font-family: inherit;
    transition: border-color 0.2s, color 0.2s;
    margin-top: 10px;
  }
  .mc-try-again-btn:hover {
    border-color: var(--mc-purple);
    color: var(--mc-text);
  }

  .mc-disclaimer {
    font-size: 0.78rem;
    color: var(--mc-muted);
    text-align: center;
    max-width: 380px;
    line-height: 1.5;
  }

  /* Shimmer on card during reveal */
  .mc-revealing .mc-card-front::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.18) 50%, transparent 60%);
    animation: mc-shimmer 0.6s ease forwards;
  }
  @keyframes mc-shimmer {
    from { transform: translateX(-100%); }
    to { transform: translateX(100%); }
  }
</style>
</head>
<body>

<div class="mc-bg-glow"></div>

<!-- Header -->
<header class="mc-header">
  <div class="mc-header-inner">
    <a href="/" class="mc-back-link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Zurück
    </a>
    <span class="mc-header-title">🎴 Mystery Card</span>
  </div>
</header>

<!-- Main -->
<main class="mc-main">

  <div class="mc-intro">
    <h1>Mystery Card</h1>
    <p>Klicke auf „Buy &amp; Reveal" um eine zufällige NFT-Karte zu enthüllen. Was steckt dahinter?</p>
  </div>

  <!-- Card flip stage -->
  <div class="mc-stage" id="mc-stage">
    <div class="mc-card-inner" id="mc-card-inner">
      <!-- Front: mystery -->
      <div class="mc-card-face mc-card-front">
        <div class="mc-question-mark">?</div>
        <div class="mc-card-front-label">Mystery</div>
      </div>
      <!-- Back: revealed (populated by JS) -->
      <div class="mc-card-face mc-card-back" id="mc-card-back">
        <div class="mc-card-art" id="mc-card-art">
          <div class="mc-card-art-bg" id="mc-card-art-bg"></div>
          <div class="mc-card-art-emoji" id="mc-card-art-emoji"></div>
        </div>
        <div class="mc-card-info">
          <div class="mc-card-name" id="mc-card-name"></div>
          <div class="mc-card-value" id="mc-card-value"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Buy & Reveal button -->
  <button class="mc-btn-buy" id="mc-btn-buy" onclick="mcReveal()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
    Buy &amp; Reveal
  </button>

  <!-- Result panel -->
  <div class="mc-result" id="mc-result">
    <div class="mc-result-tag">✨ Enthüllt</div>
    <div class="mc-result-name" id="mc-result-name"></div>
    <div class="mc-result-value" id="mc-result-value"></div>
    <a href="#" class="mc-opensea-btn" id="mc-opensea-link" target="_blank" rel="noopener">
      <svg width="18" height="18" viewBox="0 0 90 90" fill="currentColor"><path d="M45 0C20.15 0 0 20.15 0 45s20.15 45 45 45 45-20.15 45-45S69.85 0 45 0zm-8.5 55.5L22 40.5l14.5-14.5V55.5zm17 0V26l14.5 14.5L53.5 55.5z"/></svg>
      Auf OpenSea ansehen
    </a>
    <br>
    <button class="mc-try-again-btn" onclick="mcReset()">Neue Karte ziehen</button>
  </div>

  <p class="mc-disclaimer">
    Dies ist ein UI-Mockup. Keine echte Zahlung erforderlich. NFT-Karten sind zu Demo-Zwecken dargestellt.
  </p>

</main>

<script>
  const MC_CARDS = [
    {
      name: "Neon Tiger #001",
      emoji: "🐯",
      gradient: "linear-gradient(135deg, #f97316 0%, #ef4444 100%)",
      opensea_url: "https://opensea.io/collection/neon-tiger",
      value: "0.08 ETH"
    },
    {
      name: "Cosmic Dragon #042",
      emoji: "🐉",
      gradient: "linear-gradient(135deg, #8B5CF6 0%, #1d4ed8 100%)",
      opensea_url: "https://opensea.io/collection/cosmic-dragon",
      value: "0.15 ETH"
    },
    {
      name: "Pixel Fox #007",
      emoji: "🦊",
      gradient: "linear-gradient(135deg, #f59e0b 0%, #d97706 100%)",
      opensea_url: "https://opensea.io/collection/pixel-fox",
      value: "0.04 ETH"
    },
    {
      name: "Glitch Owl #113",
      emoji: "🦉",
      gradient: "linear-gradient(135deg, #22D3EE 0%, #0284c7 100%)",
      opensea_url: "https://opensea.io/collection/glitch-owl",
      value: "0.09 ETH"
    },
    {
      name: "Shadow Wolf #088",
      emoji: "🐺",
      gradient: "linear-gradient(135deg, #475569 0%, #0f172a 100%)",
      opensea_url: "https://opensea.io/collection/shadow-wolf",
      value: "0.12 ETH"
    },
    {
      name: "Crystal Unicorn #003",
      emoji: "🦄",
      gradient: "linear-gradient(135deg, #ec4899 0%, #8B5CF6 100%)",
      opensea_url: "https://opensea.io/collection/crystal-unicorn",
      value: "0.22 ETH"
    },
    {
      name: "Inferno Phoenix #019",
      emoji: "🔥",
      gradient: "linear-gradient(135deg, #ef4444 0%, #f97316 50%, #fbbf24 100%)",
      opensea_url: "https://opensea.io/collection/inferno-phoenix",
      value: "0.18 ETH"
    },
    {
      name: "Deep Sea Kraken #055",
      emoji: "🐙",
      gradient: "linear-gradient(135deg, #0e7490 0%, #064e3b 100%)",
      opensea_url: "https://opensea.io/collection/deep-sea-kraken",
      value: "0.07 ETH"
    },
    {
      name: "Galactic Bear #031",
      emoji: "🐻",
      gradient: "linear-gradient(135deg, #7c3aed 0%, #1e1b4b 100%)",
      opensea_url: "https://opensea.io/collection/galactic-bear",
      value: "0.06 ETH"
    },
    {
      name: "Neon Shark #099",
      emoji: "🦈",
      gradient: "linear-gradient(135deg, #22D3EE 0%, #1d4ed8 100%)",
      opensea_url: "https://opensea.io/collection/neon-shark",
      value: "0.11 ETH"
    }
  ];

  let mcRevealed = false;

  function mcReveal() {
    if (mcRevealed) return;
    mcRevealed = true;

    const btn = document.getElementById('mc-btn-buy');
    btn.disabled = true;

    const card = MC_CARDS[Math.floor(Math.random() * MC_CARDS.length)];

    // Populate back face
    document.getElementById('mc-card-art-bg').style.background = card.gradient;
    document.getElementById('mc-card-art-emoji').textContent = card.emoji;
    document.getElementById('mc-card-name').textContent = card.name;
    document.getElementById('mc-card-value').textContent = card.value;

    // Shimmer then flip
    const stage = document.getElementById('mc-stage');
    stage.classList.add('mc-revealing');
    setTimeout(() => {
      stage.classList.remove('mc-revealing');
      document.getElementById('mc-card-inner').classList.add('mc-flipped');
    }, 400);

    // Show result panel after flip
    setTimeout(() => {
      const result = document.getElementById('mc-result');
      document.getElementById('mc-result-name').textContent = card.name;
      document.getElementById('mc-result-value').textContent = card.value;
      document.getElementById('mc-opensea-link').href = card.opensea_url;
      result.classList.add('mc-visible');
    }, 900);
  }

  function mcReset() {
    mcRevealed = false;
    document.getElementById('mc-card-inner').classList.remove('mc-flipped');
    document.getElementById('mc-result').classList.remove('mc-visible');
    document.getElementById('mc-btn-buy').disabled = false;
  }
</script>

</body>
</html>
